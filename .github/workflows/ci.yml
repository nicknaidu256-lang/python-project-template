name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test and Lint (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e . || echo "Skipping editable install if no setup.py/pyproject.toml build exists"

    - name: Lint with Ruff (Primary)
      run: |
        ruff check .
      # Ruff enforces absolute imports via TID252 in pyproject.toml

    - name: Lint with Flake8 (Fallback)
      run: |
        flake8 .
      # Flake8 enforces absolute imports via flake8-tidy-imports in .flake8

    - name: Lint with Pylint (Fallback)
      run: |
        pylint src
      # Pylint checks for relative imports via .pylintrc

    - name: Run tests with pytest
      run: |
        pytest
